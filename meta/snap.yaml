apps:
  nginx:
    command: bin/service.nginx.sh
    user: collabora
    daemon: simple
    plugs:
    - network
    - network-bind
    start-timeout: 600s
    restart-condition: always
    
  server:
    command: bin/service.server.sh start
    daemon: simple
    plugs:
    - network
    - network-bind
    start-timeout: 600s
    restart-condition: always
    
  storage-change:
    command: bin/cli storage-change

  access-change:
    command: bin/cli access-change

confinement: strict
description: Collabora Online Development Edition
grade: stable
name: collabora
summary: Collabora Online DE
